# =============================================================================
# CodeQL Configuration for local-llm-server
# =============================================================================
# Workspace-level configuration to reduce noise while maintaining coverage.
# Only paths-ignore is guaranteed to work - query exclusions may not apply.
# =============================================================================

queries:
  # Use security-extended for comprehensive coverage
  - uses: security-extended

# Paths to exclude from analysis
paths-ignore:
  # ── Intentional patterns (false positives by design) ──
  # scripts/: CLI tools print keys once at creation, CI helpers write to temp files
  # key_store.py: SHA-256 for API key lookup (not password storage) — 128-bit entropy
  # webui/commands.py: validate_command() allowlist guards subprocess calls
  # secrets_store.py: logs hostname only, never secret values (has inline justification)
  # docker/agent_runtime.py: httpx calls to env-configured cloud provider URLs
  - scripts/
  - key_store.py
  - webui/commands.py
  - secrets_store.py
  - docker/agent_runtime.py

  # Frontend: intentional SPA patterns
  # AuthCallback.js: OAuth callback reads URL params by design
  # AdminPortalPage.js: React JSX auto-escapes (no innerHTML)
  # storage.ts: localStorage wrapper for auth tokens (standard SPA pattern)
  # SetupWizardPage.js: localStorage for draft persistence + SPA auth
  - frontend/src/pages/AuthCallback.js
  - frontend/src/pages/AdminPortalPage.js
  - frontend/src/pages/SetupWizardPage.js
  - webui/frontend/src/storage.ts

  # Dependencies
  - node_modules/
  - frontend/node_modules/
  - .venv/
  - venv/
  - .eggs/
  - "*.egg-info/"

  # Build artifacts
  - build/
  - dist/
  - .tox/
  - htmlcov/

  # Test files have different security posture
  - "**/test_*.py"
  - "**/*_test.py"
  - tests/
  - frontend/tests/
  - "**/fixtures/**"

  # CI scripts intentionally use shell=True for controlled agent execution
  # with # nosec B602 annotations - known acceptable pattern
  - .github/scripts/

  # Generated files
  - "__pycache__/"
  - "*.pyc"
  - .git/
  - "*.py.bak"
