# config/models.yaml — Canonical model catalog for the agency's brain.
#
# This file is the single source of truth for:
#   • per-provider display metadata (name, tier, base_url, key_env)
#   • per-provider role presets (planner / executor / verifier / judge)
#   • per-provider candidate failover list (used by the watchdog /
#     brain_failover chain when the primary model 410s / 404s / times out)
#
# Loaded by `packages/ai/brain_config.py::load_models_yaml()` at module
# import time. If the file is missing or corrupt, the module falls back to
# the in-module hardcoded defaults (kept in sync with this file) so a bad
# YAML edit can never brick the agent loop.
#
# Format (per provider):
#   providers:
#     <provider-id>:
#       display_name:  Human-readable label for the BrainCard dropdown
#       tier:          free | paid | local  (drives failover ordering)
#       key_env:       env-var name that holds the API key (null for ollama)
#       base_url_env:  env-var name for optional base URL override (null = none)
#       default_base_url:  default public base URL (used when env override absent)
#       role_presets:        # sensible defaults surfaced by the UI's "presets"
#         planner:   <model-id>
#         executor:  <model-id>
#         verifier:  <model-id>
#         judge:     <model-id>
#       candidates:   # ordered failover list — first model is the preset;
#                     # subsequent models are tried in order on 404/410/timeout
#         - <model-id>
#         - <model-id>
#
# Adding a new provider: append an entry here, then add the same id to the
# `BrainProvider` Literal in `packages/ai/brain_config.py`. The literal is
# the validation gate that keeps a typo in the UI from persisting an
# unusable provider.
#
# All model ids here must be live-probed by `services/brain_liveness.py`
# before a BrainConfig with them can be persisted (the PATCH /admin/api/
# policy/brain endpoint refuses dead models with 422).

# Top-level metadata
catalog_version: 1
safe_default:
  provider: nvidia
  model: z-ai/glm-5.2

# Recommended priority for auto-config (first key present wins) and for the
# watchdog's failover chain. Cloud chain is Cerebras → Groq → NVIDIA (NIM).
# Ollama leads so an operator's explicit local-brain choice is preserved
# across cloud failovers.
# PR #1046: nvidia leads the priority (not ollama) because ollama requires
# OLLAMA_BASE_URL which is not set on Render free tier. nvidia is always
# available with NVIDIA_API_KEY. ollama stays in the chain for local dev.
recommended_priority:
  - nvidia
  - cerebras
  - groq
  - ollama

providers:
  # ── Free tier (preferred) ────────────────────────────────────────────────
  nvidia:
    display_name: NVIDIA NIM (free, broad catalogue)
    tier: free
    key_env: NVIDIA_API_KEY
    base_url_env: NVIDIA_BASE_URL
    default_base_url: https://integrate.api.nvidia.com
    role_presets:
      planner:   z-ai/glm-5.2
      executor:  z-ai/glm-5.2
      verifier:  z-ai/glm-5.2
      judge:     z-ai/glm-5.2
    candidates:
      - z-ai/glm-5.2
      - z-ai/glm-5.1
      - meta/llama-4-maverick-17b-128e-instruct
      - meta/llama-4-scout-17b-16e-instruct
      - meta/llama-3.3-70b-instruct
      - nvidia/llama-3.1-nemotron-70b-instruct
      - deepseek-ai/deepseek-r1

  cerebras:
    display_name: Cerebras (fast, free tier)
    tier: free
    key_env: CEREBRAS_API_KEY
    base_url_env: CEREBRAS_BASE_URL
    default_base_url: https://api.cerebras.ai
    role_presets:
      planner:   qwen-3-coder-480b
      executor:  qwen-3-coder-480b
      verifier:  llama-3.3-70b
      judge:     llama-3.3-70b
    candidates:
