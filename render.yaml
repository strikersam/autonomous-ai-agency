services:
  - type: web
    name: local-llm-server
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # MongoDB Atlas
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: llm_wiki_dashboard
      # Storage backend: sqlite (zero-dependency, Render free tier safe)
      # or mongo when Atlas is provisioned.
      - key: STORAGE_BACKEND
        value: "sqlite"

      # JWT / Auth
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@llmrelay.local
      - key: ADMIN_PASSWORD
        sync: false

      # ================================================================
      # Autonomous loop — log watcher auto-files GitHub issues for
      # production errors; agents pick them up via the context-PR pipeline.
      # GH token comes from GH_TOKEN/GITHUB_TOKEN (sync: false, dashboard).
      # ================================================================
      - key: LOG_WATCHER_AUTO_FILE
        value: "1"
      - key: GITHUB_REPOSITORY
        value: "strikersam/autonomous-ai-agency"

      # ================================================================
      # NVIDIA NIM - Free models, first priority (no local infra needed)
      # Set NVIDIA_API_KEY in the Render dashboard to your nvapi-... key
      # ================================================================
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: "https://integrate.api.nvidia.com"
      # FREE NVIDIA NIM brain. nemotron-3-super-120b-a12b is a Nemotron-3 MoE
      # that activates only ~12B params/token (vs ~55B for the 550B "ultra"), so
      # it is several times faster per call while staying a same-generation
      # reasoning model — best fit for the latency-sensitive agent loop on a free,
      # no-rate-limit endpoint. (It 404'd briefly around issue #656, which is why
      # the ultra was pinned then; confirmed live again at
      # https://build.nvidia.com/nvidia/nemotron-3-super-120b-a12b )
      - key: NVIDIA_DEFAULT_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"

      # Agent brain roles run on the FREE NVIDIA model — NOT paid Anthropic
      # Bedrock Opus. Pinning these to us.anthropic.* is what made every agent
      # task call api.anthropic.com and fail with 400 (issue #656). Set
      # ALLOW_PAID_BRAIN=true only to deliberately opt back into paid Anthropic.
      - key: AGENT_PLANNER_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_EXECUTOR_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_VERIFIER_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_JUDGE_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"

      # LLM Provider
      - key: LLM_PROVIDER
        value: "nvidia-nim"
      - key: INCLUDE_LOCAL_FALLBACK
        value: "false"
      # Ollama - secondary fallback (leave blank when not running local Ollama)
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_BASE
        sync: false

      # Provider fallback chain (after Nvidia NIM)
      - key: HF_TOKEN
        sync: false
      - key: HF_BASE_URL
        value: "https://router.huggingface.co"
      - key: HF_MODEL_ID
        value: "Qwen/Qwen2.5-Coder-7B-Instruct"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com"
      # ================================================================
      # AWS BEDROCK — priority-15 (highest-precedence commercial provider)
      # Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in the Render
      # dashboard to enable.  Default model: us.anthropic.claude-opus-4-6-v1
      # Alternate env names: BEDROCK_ACCESS_KEY / BEDROCK_SECRET_KEY
      # ================================================================
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
      # Opus 4.7 requires AWS Sales approval — use Opus 4.6 until access is granted
      # To upgrade: change to us.anthropic.claude-opus-4-7 after AWS confirms access
      - key: BEDROCK_MODEL_ID
        value: "us.anthropic.claude-opus-4-6-v1"

      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        value: "https://api.anthropic.com"
      - key: ANTHROPIC_MODEL
        value: "claude-3-5-sonnet-latest"
      - key: OLLAMA_WINDOWS_SERVER
        sync: false
      - key: PROVIDER_COOLDOWN_SECONDS
        value: "60"

      # Frontend
      - key: FRONTEND_URL
        value: https://strikersam.github.io

      # ================================================================
      # AGENT RUNTIME CONFIGURATIONS
      # internal_agent is always available (uses Nvidia NIM).
      # Set *_BASE_URL keys to enable optional sidecar runtimes.
      # ================================================================

      # Runtime base URLs (optional sidecar runtimes)
      - key: HERMES_BASE_URL
        sync: false
      - key: OPENCODE_BASE_URL
        sync: false
      - key: GOOSE_BASE_URL
        sync: false
      - key: AIDER_BASE_URL
        sync: false
      - key: OPENHANDS_BASE_URL
        sync: false

      # Runtime routing policy
      - key: RUNTIME_NEVER_PAID
        value: "false"
      - key: RUNTIME_REQUIRE_APPROVAL
        value: "false"
      - key: RUNTIME_MAX_PAID_ESCALATIONS
        value: "0"
      # Always use internal_agent (routes through Nvidia NIM, always available)
      - key: RUNTIME_DEFAULT
        value: "internal_agent"
      # Task-type overrides: uncomment and set URL when sidecar runtimes are running
      # - key: RUNTIME_CODE_GENERATION
      #   value: "opencode"
      # - key: RUNTIME_CODE_REVIEW
      #   value: "opencode"
      # - key: RUNTIME_REPO_EDITING
      #   value: "opencode"
      # - key: RUNTIME_GIT_OPS
      #   value: "aider"
      - key: RUNTIME_HEALTH_POLL_SEC
        value: "30"

      # OpenHands (experimental - requires Docker; disabled by default)
      - key: OPENHANDS_ENABLED
        value: "false"

      # Task Harness (external CLI binary — not installed in Render container)
      - key: TASK_HARNESS_ENABLED
        value: "false"

      # Adapter-specific settings (used when sidecar runtimes are enabled)
      - key: HERMES_API_KEY
        sync: false
      - key: HERMES_TIMEOUT_SEC
        value: "300"
      - key: OPENCODE_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: GOOSE_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: GOOSE_PROFILE
        value: "default"
      - key: AIDER_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AIDER_NO_AUTO_COMMIT
        value: "false"

      # ================================================================
      # MCP SERVER — runs as a sub-app mounted at /mcp-internal
      # MCP_SERVER_BASE_URL points at this service's own external URL.
      # Workspaces are ephemeral (/tmp) on free tier — acceptable for
      # session-duration agent tasks.
      # ================================================================
      - key: MCP_SERVER_BASE_URL
        value: "https://local-llm-server.onrender.com/mcp-internal"
      - key: MCP_SECRET_TOKEN
        generateValue: true
      - key: MCP_WORKSPACE_BASE
        value: /tmp/mcp-workspaces
      - key: GITHUB_TOKEN
        sync: false
      - key: GH_PAT
        sync: false

      # ================================================================
      # WORKFLOW / AGENCY — golden-path execution backbone
      # orchestrator = full 11-phase golden path (default); legacy = old paths
      # ================================================================
      - key: AGENCY_WORKFLOW_MODE
        value: "orchestrator"

      # ================================================================
      # SELF-BOOTSTRAP — platform registers itself as a company on startup
      # ================================================================
      - key: SELF_BOOTSTRAP_ENABLED
        value: "true"
      - key: SELF_BOOTSTRAP_URL
        value: "https://local-llm-server.onrender.com"
      - key: SELF_BOOTSTRAP_REPO
        value: "https://github.com/strikersam/local-llm-server"

      # ================================================================
      # KIMI (MOONSHOT) WEB BRIDGE — free Kimi access without an API key.
      # Point KIMI_BRIDGE_URL at any OpenAI-compatible bridge (e.g. a
      # Cloudflare Worker that proxies kimi.com). Disabled by default.
      # To enable: set KIMI_BRIDGE_ENABLED=true and KIMI_BRIDGE_URL.
      # ================================================================
      - key: KIMI_BRIDGE_ENABLED
        value: "false"
      - key: KIMI_BRIDGE_URL
        sync: false
      - key: KIMI_BRIDGE_MODEL
        value: "kimi-k2.6"
      - key: KIMI_BRIDGE_PRIORITY
        value: "5"

      # ================================================================
      # AUTONOMY GATE — protected branches agents may never write to.
      # Comma-separated; defaults to main,master.
      # ================================================================
      - key: AUTONOMY_PROTECTED_BRANCHES
        value: "main,master"

      # ================================================================
      # WORKER — set to "false" once the worker service below is running
      # so background tasks are not double-processed.
      # ================================================================
      - key: RUN_BACKGROUND_IN_WEB
        value: "true"

      # ================================================================
      # FREEBUFF TELEGRAM BOT — run inside this web service (free tier:
      # one service hosts both the API and the phone-control bot).
      # Set the *sync:false* secrets in the dashboard. RUN_TELEGRAM_BOT
      # gates startup; BOT_KEEPALIVE self-pings RENDER_EXTERNAL_URL so the
      # free instance does not sleep (the bot's long-poll alone won't keep
      # it awake). See docs/deploy/freebuff-telegram-bot.md.
      # ================================================================
      - key: RUN_TELEGRAM_BOT
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Single-operator shortcut: TELEGRAM_CHAT_ID alone is enough — it falls
      # back for TELEGRAM_ALLOWED_USER_IDS, TELEGRAM_ADMIN_USER_IDS, and the
      # Telegram approval-gate / notification pushes (Autonomy Charter G1).
      # TELEGRAM_ALLOWED_USER_IDS / TELEGRAM_ADMIN_USER_IDS below are optional
      # overrides — set them only if they must differ from TELEGRAM_CHAT_ID.
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: TELEGRAM_ADMIN_USER_IDS
        sync: false
      - key: FREEBUFF_EMBEDDED
        value: "true"
      - key: AGENT_AUTO_PR_ENABLED
        value: "true"
      - key: FREEBUFF_REPO_URL
        value: "https://github.com/strikersam/local-llm-server"
      - key: FREEBUFF_BASE_BRANCH
        value: "master"
      - key: BOT_KEEPALIVE
        value: "true"

  # ── Always-on Worker (24×7 task execution + CEO loop) ─────────────────────
  # A separate worker service so task execution continues even when the web
  # service is sleeping on the free tier.  Switch the web service
  # RUN_BACKGROUND_IN_WEB to "false" once this worker is active and healthy.
  - type: worker
    name: local-llm-server-worker
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    startCommand: python worker_main.py
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: llm_wiki_dashboard
      - key: STORAGE_BACKEND
        value: "sqlite"
      - key: JWT_SECRET
        fromService:
          type: web
          name: local-llm-server
          envVarKey: JWT_SECRET
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: "https://integrate.api.nvidia.com"
      # FREE NVIDIA NIM brain — must match the web service. The 120B-a12b super
      # MoE activates only ~12B params/token (vs ~55B for the 550B "ultra"), so
      # background agent/CEO task runs stay on the fast path too. Confirmed live:
      # https://build.nvidia.com/nvidia/nemotron-3-super-120b-a12b
      - key: NVIDIA_DEFAULT_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      # Agent brain roles run on the FREE NVIDIA model — NOT paid Anthropic
      # Bedrock Opus (issue #656: agents were stuck calling api.anthropic.com /
      # Bedrock and 400ing). Set ALLOW_PAID_BRAIN=true only to opt back into paid.
      - key: AGENT_PLANNER_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_EXECUTOR_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_VERIFIER_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_JUDGE_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: LLM_PROVIDER
        value: "nvidia-nim"
      # Telegram approval-gate pushes when this worker runs the orchestrator
      # (RUN_BACKGROUND_IN_WEB=false). It only SENDS notifications; the web
      # service owns the long-poll for Approve/Reject callbacks. TELEGRAM_CHAT_ID
      # alone is enough (falls back for NOTIFY_CHAT_IDS). (issue #656 / G1)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_NOTIFY_CHAT_IDS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
      - key: BEDROCK_MODEL_ID
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GH_PAT
        sync: false
      - key: SELF_BOOTSTRAP_ENABLED
        value: "false"
      - key: AGENCY_WORKFLOW_MODE
        value: "orchestrator"
      - key: AUTONOMY_PROTECTED_BRANCHES
        value: "main,master"
      - key: RUNTIME_DEFAULT
        value: "internal_agent"
      - key: KIMI_BRIDGE_ENABLED
        value: "false"
      - key: KIMI_BRIDGE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # ── FreeBuff Telegram bot (24×7 phone control of repo edits) ──────────────
  # Always-on worker that long-polls Telegram and runs the FreeBuff agent
  # in-process (embedded mode): clones the repo, edits it on free NVIDIA NIM
  # models, and opens a draft PR. No web port — works behind any network.
  # Set the *sync:false* secrets in the Render dashboard before first deploy.
  - type: worker
    name: freebuff-telegram-bot
    env: docker
    dockerfilePath: ./Dockerfile.telegram
    plan: free
    envVars:
      # Telegram (from @BotFather and @userinfobot). TELEGRAM_CHAT_ID alone is
      # enough — it falls back for ALLOWED_USER_IDS/ADMIN_USER_IDS too.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: TELEGRAM_ADMIN_USER_IDS
        sync: false
      # Single-poller guard (issue #656): Telegram allows only ONE getUpdates
      # consumer per bot token. The web service (local-llm-server) owns the
      # long-poll because it also runs the WorkflowOrchestrator in-process
      # (RUN_BACKGROUND_IN_WEB=true), which the G1 approval-gate Approve/Reject
      # callbacks need. If this worker shares the same TELEGRAM_BOT_TOKEN, keep
      # this "true" so it does NOT poll (avoids the 409/429 conflict storm).
      # Give it a SEPARATE bot token and set this to "false" to run two bots.
      - key: TELEGRAM_POLLER_DISABLED
        value: "true"
      # FreeBuff embedded-mode config
      - key: FREEBUFF_EMBEDDED
        value: "true"
      - key: AGENCY_WORKFLOW_MODE
        value: "legacy"
      - key: AGENT_AUTO_PR_ENABLED
        value: "true"
      - key: FREEBUFF_REPO_URL
        value: "https://github.com/strikersam/local-llm-server"
      - key: FREEBUFF_BASE_BRANCH
        value: "master"
      # Optional: override the free-model list (comma-separated)
      - key: FREEBUFF_MODELS
        sync: false
      # NVIDIA NIM (free) — powers the agent
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: "https://integrate.api.nvidia.com"
      # GitHub token — used to clone, push branches and open draft PRs
      - key: GITHUB_TOKEN
        sync: false
      - key: GH_PAT
        sync: false
      # Commit identity for agent commits
      - key: GIT_AUTHOR_NAME
        value: "FreeBuff Bot"
      - key: GIT_AUTHOR_EMAIL
        value: "freebuff-bot@users.noreply.github.com"
