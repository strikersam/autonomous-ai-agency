services:
  - type: web
    name: local-llm-server
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # MongoDB Atlas
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: llm_wiki_dashboard
      # Storage backend: sqlite (zero-dependency, Render free tier safe)
      # or mongo when Atlas is provisioned.
      - key: STORAGE_BACKEND
        value: "sqlite"

      # JWT / Auth
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@llmrelay.local
      - key: ADMIN_PASSWORD
        sync: false

      # ================================================================
      # NVIDIA NIM - Free models, first priority (no local infra needed)
      # Set NVIDIA_API_KEY in the Render dashboard to your nvapi-... key
      # ================================================================
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: "https://integrate.api.nvidia.com/v1"
      - key: NVIDIA_DEFAULT_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"

      # Agent model defaults — Bedrock Opus 4.6 (highest confirmed-accessible Opus)
      # Routing: us.anthropic.* model IDs are exclusive to the bedrock provider;
      # Nvidia NIM and other providers are bypassed automatically.
      - key: AGENT_PLANNER_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AGENT_EXECUTOR_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AGENT_VERIFIER_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AGENT_JUDGE_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"

      # LLM Provider
      - key: LLM_PROVIDER
        value: "nvidia-nim"
      - key: INCLUDE_LOCAL_FALLBACK
        value: "false"
      # Ollama - secondary fallback (leave blank when not running local Ollama)
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_BASE
        sync: false

      # Provider fallback chain (after Nvidia NIM)
      - key: HF_TOKEN
        sync: false
      - key: HF_BASE_URL
        value: "https://router.huggingface.co"
      - key: HF_MODEL_ID
        value: "Qwen/Qwen2.5-Coder-7B-Instruct"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com"
      # ================================================================
      # AWS BEDROCK — priority-15 (highest-precedence commercial provider)
      # Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in the Render
      # dashboard to enable.  Default model: us.anthropic.claude-opus-4-6-v1
      # Alternate env names: BEDROCK_ACCESS_KEY / BEDROCK_SECRET_KEY
      # ================================================================
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
      # Opus 4.7 requires AWS Sales approval — use Opus 4.6 until access is granted
      # To upgrade: change to us.anthropic.claude-opus-4-7 after AWS confirms access
      - key: BEDROCK_MODEL_ID
        value: "us.anthropic.claude-opus-4-6-v1"

      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        value: "https://api.anthropic.com"
      - key: ANTHROPIC_MODEL
        value: "claude-3-5-sonnet-latest"
      - key: OLLAMA_WINDOWS_SERVER
        sync: false
      - key: PROVIDER_COOLDOWN_SECONDS
        value: "60"

      # Frontend
      - key: FRONTEND_URL
        value: https://strikersam.github.io

      # ================================================================
      # AGENT RUNTIME CONFIGURATIONS
      # internal_agent is always available (uses Nvidia NIM).
      # Set *_BASE_URL keys to enable optional sidecar runtimes.
      # ================================================================

      # Runtime base URLs (optional sidecar runtimes)
      - key: HERMES_BASE_URL
        sync: false
      - key: OPENCODE_BASE_URL
        sync: false
      - key: GOOSE_BASE_URL
        sync: false
      - key: AIDER_BASE_URL
        sync: false
      - key: OPENHANDS_BASE_URL
        sync: false

      # Runtime routing policy
      - key: RUNTIME_NEVER_PAID
        value: "false"
      - key: RUNTIME_REQUIRE_APPROVAL
        value: "false"
      - key: RUNTIME_MAX_PAID_ESCALATIONS
        value: "0"
      # Always use internal_agent (routes through Nvidia NIM, always available)
      - key: RUNTIME_DEFAULT
        value: "internal_agent"
      # Task-type overrides: uncomment and set URL when sidecar runtimes are running
      # - key: RUNTIME_CODE_GENERATION
      #   value: "opencode"
      # - key: RUNTIME_CODE_REVIEW
      #   value: "opencode"
      # - key: RUNTIME_REPO_EDITING
      #   value: "opencode"
      # - key: RUNTIME_GIT_OPS
      #   value: "aider"
      - key: RUNTIME_HEALTH_POLL_SEC
        value: "30"

      # OpenHands (experimental - requires Docker; disabled by default)
      - key: OPENHANDS_ENABLED
        value: "false"

      # Task Harness (external CLI binary — not installed in Render container)
      - key: TASK_HARNESS_ENABLED
        value: "false"

      # Adapter-specific settings (used when sidecar runtimes are enabled)
      - key: HERMES_API_KEY
        sync: false
      - key: HERMES_TIMEOUT_SEC
        value: "300"
      - key: OPENCODE_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: GOOSE_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: GOOSE_PROFILE
        value: "default"
      - key: AIDER_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AIDER_NO_AUTO_COMMIT
        value: "false"

      # ================================================================
      # MCP SERVER — runs as a sub-app mounted at /mcp-internal
      # MCP_SERVER_BASE_URL points at this service's own external URL.
      # Workspaces are ephemeral (/tmp) on free tier — acceptable for
      # session-duration agent tasks.
      # ================================================================
      - key: MCP_SERVER_BASE_URL
        value: "https://local-llm-server.onrender.com/mcp-internal"
      - key: MCP_SECRET_TOKEN
        generateValue: true
      - key: MCP_WORKSPACE_BASE
        value: /tmp/mcp-workspaces
      - key: GITHUB_TOKEN
        sync: false
      - key: GH_PAT
        sync: false

      # ================================================================
      # WORKFLOW / AGENCY — golden-path execution backbone
      # orchestrator = full 11-phase golden path (default); legacy = old paths
      # ================================================================
      - key: AGENCY_WORKFLOW_MODE
        value: "orchestrator"

      # ================================================================
      # SELF-BOOTSTRAP — platform registers itself as a company on startup
      # ================================================================
      - key: SELF_BOOTSTRAP_ENABLED
        value: "true"
      - key: SELF_BOOTSTRAP_URL
        value: "https://local-llm-server.onrender.com"
      - key: SELF_BOOTSTRAP_REPO
        value: "https://github.com/strikersam/local-llm-server"

      # ================================================================
      # KIMI (MOONSHOT) WEB BRIDGE — free Kimi access without an API key.
      # Point KIMI_BRIDGE_URL at any OpenAI-compatible bridge (e.g. a
      # Cloudflare Worker that proxies kimi.com). Disabled by default.
      # To enable: set KIMI_BRIDGE_ENABLED=true and KIMI_BRIDGE_URL.
      # ================================================================
      - key: KIMI_BRIDGE_ENABLED
        value: "false"
      - key: KIMI_BRIDGE_URL
        sync: false
      - key: KIMI_BRIDGE_MODEL
        value: "kimi-k2.6"
      - key: KIMI_BRIDGE_PRIORITY
        value: "5"

      # ================================================================
      # AUTONOMY GATE — protected branches agents may never write to.
      # Comma-separated; defaults to main,master.
      # ================================================================
      - key: AUTONOMY_PROTECTED_BRANCHES
        value: "main,master"

      # ================================================================
      # WORKER — set to "false" once the worker service below is running
      # so background tasks are not double-processed.
      # ================================================================
      - key: RUN_BACKGROUND_IN_WEB
        value: "true"

  # ── Always-on Worker (24×7 task execution + CEO loop) ─────────────────────
  # A separate worker service so task execution continues even when the web
  # service is sleeping on the free tier.  Switch the web service
  # RUN_BACKGROUND_IN_WEB to "false" once this worker is active and healthy.
  - type: worker
    name: local-llm-server-worker
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    startCommand: python worker_main.py
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: llm_wiki_dashboard
      - key: STORAGE_BACKEND
        value: "sqlite"
      - key: JWT_SECRET
        fromService:
          type: web
          name: local-llm-server
          envVarKey: JWT_SECRET
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: "https://integrate.api.nvidia.com/v1"
      - key: NVIDIA_DEFAULT_MODEL
        value: "nvidia/nemotron-3-super-120b-a12b"
      - key: AGENT_PLANNER_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AGENT_EXECUTOR_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AGENT_VERIFIER_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: AGENT_JUDGE_MODEL
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: LLM_PROVIDER
        value: "nvidia-nim"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
      - key: BEDROCK_MODEL_ID
        value: "us.anthropic.claude-opus-4-6-v1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GH_PAT
        sync: false
      - key: SELF_BOOTSTRAP_ENABLED
        value: "false"
      - key: AGENCY_WORKFLOW_MODE
        value: "orchestrator"
      - key: AUTONOMY_PROTECTED_BRANCHES
        value: "main,master"
      - key: RUNTIME_DEFAULT
        value: "internal_agent"
      - key: KIMI_BRIDGE_ENABLED
        value: "false"
      - key: KIMI_BRIDGE_URL
        sync: false
      - key: REDIS_URL
        sync: false
