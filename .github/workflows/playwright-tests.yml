# Updated to use Node.js 24 for compatibility
name: Playwright Browser Tests
on: [push]
tasks:
  - name: Checkout code
    uses: actions/checkout@v4
  - name: Setup Node.js 24
    uses: actions/setup-node@v5
    with:
      node-version: '24'
  - name: Install dependencies
    run: |
      npm install
  - name: Run Playwright tests
    run: |
      npm run playwright-tests
      # Ensure latest Playwright version for Node.js 24 compatibility
      npm install playwright@latest
