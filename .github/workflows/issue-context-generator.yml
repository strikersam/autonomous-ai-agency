name: Issue Context Generator

# Triggers whenever ANY new issue is opened (not just quick-note labeled).
# Also fires when the 'quick-note' label is added to an existing issue,
# OR when any human applies a label to a previously-untracked issue.
#
# Pipeline:
#   open issue → generate prompt + TODO → branch → commit context doc → DRAFT PR → dispatch implementation
#
# PRs are created in DRAFT status to prevent CodeRabbit / Copilot reviews
# until a human or the process-quick-note workflow converts to ready.

on:
  issues:
    types: [opened, labeled]

# One run per issue at a time. cancel-in-progress is OFF so a re-trigger
# (e.g. a human adding a label right after open) does NOT kill a long-running
# context-generation run mid-flight — the first run completes and posts its
# PR comment; the second run is then a no-op (the recover-existing-PR branch
# at step 6 finds the already-created draft).  Cancellation previously
# produced zero-PR races where both runs saw "no PR" and the second won,
# orphaning the first run's branch.
concurrency:
  group: issue-context-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Short-circuit path for self-test issues: post a verification comment, close
  # the issue, and skip the full LLM/dispatch pipeline. Prevents the no-URL
  # failure loop that left issue #584 stuck open across 3 retry attempts.
  verify-automation-test:
    if: contains(github.event.issue.labels.*.name, 'automation-test')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify pipeline and close automation-test issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "✅ **Automation self-test PASSED** — the issue→context generator pipeline is alive. Closing as completed."
          gh issue close "$ISSUE_NUM" --repo "$REPO" --reason completed
          echo "Closed automation-test issue #$ISSUE_NUM"

  generate-context:
    # Process EVERY opened issue, and any labeled event regardless of which
    # label was added (a human applying a label signals "please pick this up").
    # Automation-test issues are short-circuited by the verify-automation-test
    # job above; the !contains guard here is belt-and-suspenders.
    if: >
      !contains(github.event.issue.labels.*.name, 'automation-test') &&
      (github.event.action == 'opened' ||
       github.event.action == 'labeled')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install openai requests anthropic --quiet

      # ── 3. Generate context (prompt + TODO list) ─────────────────────────────
      - name: Generate context via LLM
        id: context
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
        run: |
          python3 .github/scripts/generate_context.py \
            "$ISSUE_NUMBER" \
            2>&1 | tee /tmp/context_output.txt

          if [ -f /tmp/context_result.json ]; then
            echo "generated=true" >> "$GITHUB_OUTPUT"
            SUGGESTED_TITLE=$(python3 -c "
          import json, sys
          d = json.load(open('/tmp/context_result.json'))
          print(d.get('title', '')[:70])
            " 2>/dev/null || echo "")
            echo "title=$SUGGESTED_TITLE" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "Context generation failed — see log above."
          fi

      # ── 4. Create context branch ─────────────────────────────────────────────
      - name: Create context branch
        id: branch
        if: steps.context.outputs.generated == 'true'
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          BRANCH="claude/context-issue-${ISSUE_NUM}"
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"

          # Remove any stale branch from a previous run
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 5. Write context document and commit ALL logical artifacts ────────────
      # Any file written by the context script or this step is committed here.
      # This ensures the draft PR always reflects a logically-complete snapshot.
      - name: Commit context doc to branch
        id: commit
        if: steps.branch.outputs.branch != ''
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          mkdir -p docs/context

          # Write the context markdown file
          python3 - <<'PYEOF'
          import json, os
          result = json.load(open('/tmp/context_result.json'))
          issue = os.environ['ISSUE_NUM']
          content = result.get('context_doc', result.get('pr_description', ''))
          with open(f'docs/context/issue-{issue}.md', 'w') as f:
              f.write(content)
          print(f"Wrote docs/context/issue-{issue}.md ({len(content)} chars)")
          PYEOF

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "docs(context): generate implementation plan for issue #${ISSUE_NUM}"
            git push -u origin "$BRANCH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Context doc committed and pushed to $BRANCH"
          fi

      # ── 6. Create DRAFT pull request ─────────────────────────────────────────
      # Draft status prevents CodeRabbit, Copilot, and other review bots from
      # triggering until the PR is explicitly marked ready for review.
      - name: Create draft PR
        id: pr
        if: steps.branch.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          SUGGESTED_TITLE: ${{ steps.context.outputs.title }}
        run: |
          PR_BODY=$(python3 -c "
          import json, os, sys
          try:
              d = json.load(open('/tmp/context_result.json'))
              print(d.get('pr_description', '(context generation failed)'))
          except Exception as e:
              print(f'Error reading context: {e}')
              sys.exit(1)
          ")

          # Use LLM-suggested title if available, else derive from issue title
          if [ -n "$SUGGESTED_TITLE" ]; then
            RAW_TITLE="$SUGGESTED_TITLE"
          else
            RAW_TITLE="${ISSUE_TITLE:0:55} (#${ISSUE_NUM})"
          fi
          # Context PRs only add docs/context/*.md — force a `docs:` prefix so the
          # changelog-check gate exempts them. Strip any feat:/fix: prefix first.
          CLEAN_TITLE=$(echo "$RAW_TITLE" | sed -E 's/^(feat|fix|refactor|chore|docs|style|ci|test|perf|build)(\([^)]*\))?:[[:space:]]*//')
          PR_TITLE="docs: ${CLEAN_TITLE}"

          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base master \
            --head "$BRANCH" \
            --draft 2>&1) || {
            # Recover existing draft PR if one already exists for this branch
            echo "WARN: gh pr create failed — checking for existing PR"
            PR_URL=$(gh pr list \
              --repo "$REPO" \
              --head "$BRANCH" \
              --state open \
              --json url \
              --jq '.[0].url' 2>/dev/null || echo "")
          }

          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL"    >> "$GITHUB_OUTPUT"
          echo "Draft PR: #$PR_NUM — $PR_URL"

          # SAFETY: label the draft PR with quick-note:planning so housekeeping
          # workflows (auto-merge, close-stale-prs, etc.) can identify planning-only
          # PRs and skip them. The label is removed by process-quick-note after the
          # implement agent pushes real code and marks the PR ready.
          # NOTE: the `|| true` on the apply is intentional -- the canonical guard
          # is the isDraft check in auto-merge.yml / process-quick-note.yml. The
          # label is a fast-path filter for future housekeeping workflows; if the
          # apply fails silently the isDraft check still protects the PR.
          gh label create "quick-note:planning" \
            --repo "$REPO" \
            --color "fef2c0" \
            --description "Planning-only draft PR (no code yet) -- do not auto-merge or close" \
            2>/dev/null || true
          gh pr edit "$PR_NUM" \
            --repo "$REPO" \
            --add-label "quick-note:planning" \
            2>/dev/null || true

      # ── 7. Comment + dispatch auto-implementation — issue STAYS OPEN ──────────
      # REGRESSION FIX (2026-06-13): previously this step closed the issue with
      # reason "completed" immediately after the context doc draft PR was made.
      # That broke issue→implementation-PR autonomy: the Process Quick Note
      # workflow only picks up *open* issues, so a closed issue could never be
      # auto-implemented. We now (a) leave the issue OPEN, (b) trigger the
      # implementation workflow directly via workflow_dispatch so a real
      # code PR follows the context PR without manual intervention.
      - name: Comment + dispatch auto-implementation
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          PR_NUM: ${{ steps.pr.outputs.pr_number }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          gh issue comment "$ISSUE_NUM" \
            --repo "$REPO" \
            --body "$(cat <<MSG
          🧠 **Context generated** — Draft PR #${PR_NUM} created with a full implementation prompt and TODO list.

          **Draft PR:** ${PR_URL}

          The implementation workflow has been **auto-dispatched** for this issue. A
          code PR will follow on branch \`claude/context-issue-${ISSUE_NUM}\`. This
          issue stays **open** until implementation is verified, then it is closed
          automatically by the Process Quick Note pipeline.
          MSG
          )"

          # Auto-trigger the implementation workflow for this specific issue.
          # Non-fatal: if dispatch fails (e.g. workflow quarantined), the issue
          # simply remains open for the scheduled run / manual trigger to pick up.
          gh workflow run process-quick-note.yml \
            --repo "$REPO" \
            -f issue_number="$ISSUE_NUM" \
            2>&1 || echo "::warning::Could not auto-dispatch process-quick-note (issue left open for scheduled pickup)."

      # ── 8. Failure fallback ───────────────────────────────────────────────────
      - name: Comment — context generation failed
        if: >
          always() &&
          steps.context.outputs.generated != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          TAIL=$(tail -30 /tmp/context_output.txt 2>/dev/null || echo "(no log)")
          gh issue comment "$ISSUE_NUM" \
            --repo "$REPO" \
            --body "$(cat <<MSG
          ⚠️ Context generation failed — no draft PR was created.

          \`\`\`
          $TAIL
          \`\`\`

          Please trigger the workflow manually once NVIDIA_API_KEY or ANTHROPIC_API_KEY is confirmed.
          MSG
          )" 2>/dev/null || true
