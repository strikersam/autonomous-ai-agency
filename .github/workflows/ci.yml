name: CI

on:
  push:
    branches: ["**"]
    # Pure-docs context commits (auto-generated issue plans) and graphify's
    # auto-refreshed codebase graph report don't need CI.
    paths-ignore: ["docs/context/**", "graphify-out/**"]
  pull_request:
    branches: ["main", "master"]
    paths-ignore: ["docs/context/**", "graphify-out/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Skip CI on draft PRs (e.g. auto-generated context plans). Runs on push
    # and once a PR is marked ready for review.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    strategy:
      matrix:
        python-version: ['3.11']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall -q .
          printf '✓ Python syntax OK\n'

      - name: Configure Git for test subprocess calls
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Test Runner"
          git config --global commit.gpgsign false
          git config --global init.defaultBranch master

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 27017; then
              printf '✓ MongoDB is reachable on localhost:27017\n'
              exit 0
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done
          echo "::error::MongoDB did not become reachable within 60s"
          exit 1

      - name: Run tests
        env:
          # Provide stub env vars so modules that read env at import time don't error
          API_KEYS: "ci-test-key"
          ADMIN_EMAIL: "admin@llmrelay.local"
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci-test-admin-password-do-not-use' }}
          SECRET_KEY: "ci-test-secret-do-not-use"
          OLLAMA_BASE: "http://localhost:11434"
          LANGFUSE_SECRET_KEY: ""
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_HOST: ""
          ROUTER_HEALTH_CHECK_ENABLED: "false"
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "llm_wiki_dashboard_ci"
        run: |
          pytest -x -v --tb=short --timeout=120 --ignore=tests/test_hardware.py --ignore=tests/test_backend_runtime_bootstrap.py

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7

  lint:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Check for hardcoded secrets
        run: |
          # Fail if any non-test .py file has a hardcoded SECRET_KEY assignment
          if grep -rn --include="*.py" \
            --exclude-dir=".venv" \
            --exclude-dir="tests" \
            'SECRET_KEY\s*=\s*["\x27][^"]+["\x27]' .; then
            echo "::error::Hardcoded SECRET_KEY found — use environment variables"
            exit 1
          fi
          printf '✓ No hardcoded secrets found\n'

  frontend:
    name: Frontend test + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: "true"
        run: npm test -- --watchAll=false --forceExit --runInBand

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://relay.example.com
          PUBLIC_URL: /local-llm-server
        run: npm run build