name: Weekly user-research repo scan

on:
  schedule:
    - cron: "0 3 * * 1"  # Mondays 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pydantic

      - name: Run user-research repo scan
        run: |
          python scripts/scan_repo_with_user_research.py | tee scan-output.txt

      - name: Open issue on drift
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let out = '';
            try { out = fs.readFileSync('scan-output.txt', 'utf8'); } catch (e) {}
            const brief = out.split('SCAN COMPLETE')[0].slice(-3500);
            // Only file an issue if recommendations were produced
            if (!/recs:\s*[1-9]/.test(out)) return;
            const title = 'Weekly user-research scan: recommendations pending';
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'user-research-scan'
            });
            const body = 'Automated weekly scan output:\n\n```\n' + brief + '\n```';
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['user-research-scan']
              });
            }
