name: Autonomous Agent

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to process (optional)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-agent
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Install deps
        run: pip install httpx 2>&1 | tail -3

      - name: Run autonomous agent
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          # Recommended free-cloud brain chain (Cerebras -> Groq -> NVIDIA NIM),
          # selected by which key is present — the auto-PR scripts no longer
          # hardcode the weak NIM 49B. Set CEREBRAS_API_KEY for the best results.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
        run: python3 .github/scripts/autonomous_agent.py
