name: Autonomous Agent

# Runs the agency's agent work directly in GitHub Actions — NOT on Render.
# This bypasses Render's free-tier limitations (spin-down, Docker cache,
# short timeouts). The GitHub Actions runner calls NVIDIA NIM directly,
# generates code, and opens a PR.
#
# Runs every 30 minutes (GitHub free tier allows this frequency for
# scheduled workflows). Each run processes ONE open issue.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to process (optional)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-agent
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install minimal deps
        run: pip install httpx pydantic 2>&1 | tail -3

      - name: Find oldest open issue
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          if [ -z "$ISSUE_NUMBER" ]; then
            # Find the oldest open issue (excluding PRs and exhausted)
            ISSUE_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=50&sort=created&direction=asc" \
              | python3 -c "
          import json, sys
          issues = [i for i in json.load(sys.stdin) if 'pull_request' not in i]
          actionable = [i for i in issues if 'quick-note:exhausted' not in [l.get('name','') for l in i.get('labels',[])]]
          if actionable:
              i = actionable[0]
              print(json.dumps({'number': i['number'], 'title': i['title'], 'body': (i.get('body') or '')[:3000], 'labels': [l['name'] for l in i.get('labels',[])]}))
          else:
              print('{}')
          ")
            echo "issue_data=$ISSUE_DATA" >> $GITHUB_OUTPUT
            NUMBER=$(echo "$ISSUE_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin).get('number',''))")
            echo "issue_number=$NUMBER" >> $GITHUB_OUTPUT
          else
            echo "Processing issue #$ISSUE_NUMBER (manual)"
            ISSUE_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
              | python3 -c "
          import json, sys
          i = json.load(sys.stdin)
          print(json.dumps({'number': i['number'], 'title': i['title'], 'body': (i.get('body') or '')[:3000], 'labels': [l['name'] for l in i.get('labels',[])]}))
          ")
            echo "issue_data=$ISSUE_DATA" >> $GITHUB_OUTPUT
            echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          fi
          
          echo "Processing issue: ${{ steps.find-issue.outputs.issue_number }}"

      - name: Generate implementation with NVIDIA NIM
        id: generate
        if: steps.find-issue.outputs.issue_number != ''
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ISSUE_DATA: ${{ steps.find-issue.outputs.issue_data }}
        run: |
          set -e
          echo "$ISSUE_DATA" | python3 -c "
          import json, sys, os, httpx
          
          issue = json.load(sys.stdin)
          if not issue.get('number'):
              print('No issue to process')
              sys.exit(0)
          
          print(f'Processing issue #{issue[\"number\"]}: {issue[\"title\"][:60]}')
          
          # Build the prompt for NVIDIA NIM
          issue_body = issue.get('body', '')[:2000]
          prompt = f'''You are an autonomous AI agent implementing a GitHub issue for the Autonomous AI Agency repository.

          Issue #{issue['number']}: {issue['title']}
          
          Issue body:
          {issue_body}
          
          Instructions:
          1. Read the issue carefully and understand what's being asked.
          2. Identify the most relevant files in the repository to modify.
          3. Write a concrete, minimal implementation that addresses the issue.
          4. Output the changes as a list of files with their full content.
          
          Format your response as JSON:
          {{
            \"summary\": \"Brief description of what was implemented\",
            \"files\": [
              {{
                \"path\": \"path/to/file.py\",
                \"action\": \"create\" or \"modify\",
                \"content\": \"full file content\"
              }}
            ],
            \"changelog\": \"One-line changelog entry\"
          }}
          
          Only output the JSON, no other text.'''
          
          # Call NVIDIA NIM
          resp = httpx.post(
              'https://integrate.api.nvidia.com/v1/chat/completions',
              headers={
                  'Authorization': f'Bearer {os.environ[\"NVIDIA_API_KEY\"]}',
                  'Content-Type': 'application/json',
              },
              json={
                  'model': 'nvidia/llama-3.3-nemotron-super-49b-v1',
                  'messages': [
                      {'role': 'system', 'content': 'You are an expert software engineer. Output only valid JSON.'},
                      {'role': 'user', 'content': prompt},
                  ],
                  'max_tokens': 4096,
                  'temperature': 0.3,
                  'stream': False,
              },
              timeout=120.0,
          )
          resp.raise_for_status()
          
          content = resp.json()['choices'][0]['message']['content']
          print('NVIDIA NIM response received')
          
          # Parse the JSON response — NIM often generates malformed JSON
          # (missing commas, unescaped quotes, trailing commas, etc.)
          # Use a robust extraction + repair approach.
          import re, ast
          
          # Find the JSON block
          start = content.find('{')
          end = content.rfind('}') + 1
          if start < 0 or end <= start:
              print('ERROR: No JSON found in response')
              print(content[:500])
              sys.exit(1)
          
          json_str = content[start:end]
          
          # Try strict JSON first
          result = None
          try:
              result = json.loads(json_str)
          except json.JSONDecodeError:
              print('Strict JSON parse failed — trying repair...')
              # Common fixes:
              # 1. Remove trailing commas before } or ]
              fixed = re.sub(r',\s*([}\]])', r'\1', json_str)
              # 2. Fix unescaped newlines in strings
              fixed = fixed.replace('\\n', '\\\\n').replace('\\t', '\\\\t')
              try:
                  result = json.loads(fixed)
              except json.JSONDecodeError:
                  # 3. Try ast.literal_eval (handles single quotes, etc.)
                  try:
                      # Convert to Python dict literal
                      py_str = fixed.replace('true', 'True').replace('false', 'False').replace('null', 'None')
                      result = ast.literal_eval(py_str)
                  except Exception:
                      # 4. Last resort: extract files using regex
                      print('JSON repair failed — extracting files via regex')
                      files = []
                      # Find all "path": "..." and "content": "..." pairs
                      path_matches = re.findall(r'\"path\":\s*\"([^\"]+)\"', json_str)
                      content_matches = re.findall(r'\"content\":\s*\"((?:[^\"\\]|\\.)*)\"', json_str)
                      for i, path in enumerate(path_matches):
                          file_content = content_matches[i] if i < len(content_matches) else ''
                          # Unescape
                          file_content = file_content.replace('\\\\n', '\\n').replace('\\\\t', '\\t').replace('\\\\"', '\"')
                          files.append({'path': path, 'action': 'create', 'content': file_content})
                      summary_match = re.search(r'\"summary\":\s*\"([^\"]+)\"', json_str)
                      result = {
                          'summary': summary_match.group(1) if summary_match else 'Extracted via regex',
                          'files': files,
                          'changelog': 'Agent implementation',
                      }
          
          if not result or not result.get('files'):
              print('ERROR: No files in result')
              print(json.dumps(result, indent=2)[:500] if result else 'No result')
              sys.exit(1)
          
          # Save the result
          with open('/tmp/agent_result.json', 'w') as f:
              json.dump(result, f, indent=2)
          
          print(f'Summary: {result.get(\"summary\", \"\")}')
          print(f'Files: {len(result.get(\"files\", []))}')
          " 2>&1
          
          if [ -f /tmp/agent_result.json ]; then
            echo "has_result=true" >> $GITHUB_OUTPUT
          else
            echo "has_result=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply changes and create PR
        if: steps.generate.outputs.has_result == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_DATA: ${{ steps.find-issue.outputs.issue_data }}
        run: |
          set -e
          ISSUE_NUMBER=$(echo "$ISSUE_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin).get('number',''))")
          
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No issue number"
            exit 0
          fi
          
          # Create a branch — delete existing branch first if it exists
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          git config user.name "Autonomous Agency"
          git config user.email "agency@autonomous.ai"
          # Delete the branch if it already exists (from a previous failed run)
          git branch -D "$BRANCH" 2>/dev/null || true
          git push origin --delete "$BRANCH" 2>/dev/null || true
          # Create fresh branch from current master
          git checkout -b "$BRANCH"
          
          # Apply file changes from the agent result
          python3 -c "
          import json, os
          
          with open('/tmp/agent_result.json') as f:
              result = json.load(f)
          
          for file_info in result.get('files', []):
              path = file_info.get('path', '')
              action = file_info.get('action', 'create')
              content = file_info.get('content', '')
              
              if not path:
                  continue
              
              os.makedirs(os.path.dirname(path) or '.', exist_ok=True)
              with open(path, 'w') as f:
                  f.write(content)
              print(f'{action}: {path}')
          "
          
          # Add changelog entry
          python3 -c "
          import json
          with open('/tmp/agent_result.json') as f:
              result = json.load(f)
          changelog = result.get('changelog', f'Implement issue #{'$ISSUE_NUMBER'}')
          
          for path in ['CHANGELOG.md', 'docs/changelog.md']:
              try:
                  with open(path) as f:
                      content = f.read()
                  marker = '## [Unreleased]\n\n### Added\n\n'
                  if marker not in content:
                      marker = '## [Unreleased]\n\n### Fixed\n\n'
                  if marker in content:
                      content = content.replace(marker, marker + f'- {changelog} (issue #{\"'$ISSUE_NUMBER'\"})\n\n', 1)
                      with open(path, 'w') as f:
                          f.write(content)
                      print(f'Updated {path}')
              except Exception as e:
                  print(f'Skipped {path}: {e}')
          "
          
          # Commit and push
          git add -A
          git commit -m "feat: implement issue #${ISSUE_NUMBER}

          Generated by the Autonomous Agency using NVIDIA NIM.
          
          Issue: #${ISSUE_NUMBER}
          "
          git push origin "$BRANCH"
          
          # Create PR
          PR_TITLE=$(python3 -c "import json; print(json.load(open('/tmp/agent_result.json')).get('summary','')[:60])")
          gh pr create \
            --title "feat: implement issue #${ISSUE_NUMBER} — ${PR_TITLE}" \
            --body "## Autonomous Agency PR
          
          This PR implements issue #${ISSUE_NUMBER} using NVIDIA NIM.
          
          Generated by the autonomous agency cycle.
          
          🤖 Generated with NVIDIA NIM" \
            --base master \
            --head "$BRANCH" || echo "PR creation failed (may already exist)"
          
          echo "PR created for issue #${ISSUE_NUMBER}"

      - name: Skip if no issue
        if: steps.find-issue.outputs.issue_number == ''
        run: echo "No open issues to process — agency is idle"
