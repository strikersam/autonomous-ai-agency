name: Browser E2E — Playwright (desktop + mobile)

on:
  push:
    branches: ["main", "master"]
    paths-ignore: ["docs/context/**"]
  pull_request:
    branches: ["main", "master"]
    paths-ignore: ["docs/context/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-e2e:
    name: Playwright browser tests (desktop + mobile)
    runs-on: ubuntu-latest
    # Skip on draft PRs (e.g. auto-generated context plans).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Generate ephemeral test credentials
        # Don't commit signing material in the workflow. The JWT secret is
        # generated fresh per run; the admin email/password are throwaway test
        # fixtures for this ephemeral container (destroyed at job end). All three
        # are shared across the steps below via $GITHUB_ENV.
        run: |
          {
            echo "E2E_JWT_SECRET=$(openssl rand -hex 32)"
            echo "E2E_ADMIN_EMAIL=admin@llmrelay.local"
            echo "E2E_ADMIN_PASSWORD=$(openssl rand -base64 18)"
          } >> "$GITHUB_ENV"

      - name: Build and start backend
        # Dockerfile.backend is multi-stage: it builds the React SPA from source
        # (stage 1) and serves it from the backend image, so no separate frontend
        # build step is needed here and it works from a clean checkout.
        run: |
          docker build -t llm-relay-backend -f Dockerfile.backend .
          docker run -d --name e2e-backend \
            -p 8001:8001 \
            -e STORAGE_BACKEND=sqlite \
            -e ADMIN_EMAIL="$E2E_ADMIN_EMAIL" \
            -e ADMIN_PASSWORD="$E2E_ADMIN_PASSWORD" \
            -e JWT_SECRET="$E2E_JWT_SECRET" \
            -e LLM_PROVIDER=ollama \
            -e ROUTER_HEALTH_CHECK_ENABLED=false \
            llm-relay-backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            STATUS=$(curl -sf http://localhost:8001/api/health -o /dev/null -w "%{http_code}" 2>/dev/null || echo 000)
            [ "$STATUS" = "200" ] && echo "Backend ready (attempt $i)" && exit 0
            echo "Waiting... ($i/30, status=$STATUS)"; sleep 3
          done
          echo "::error::Backend did not start"
          docker logs e2e-backend
          exit 1

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Playwright E2E tests (desktop + mobile)
        env:
          RELAY_BASE_URL: http://localhost:8001
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
        run: |
          python tests/e2e/test_browser.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-browser-screenshots
          path: /tmp/*.png
          retention-days: 7

      - name: Upload backend logs on failure
        if: failure()
        run: |
          docker logs e2e-backend > /tmp/backend-logs.txt 2>&1
          cat /tmp/backend-logs.txt

      - name: Run API e2e tests (complementary)
        if: always()
        env:
          # This suite runs IN-PROCESS via FastAPI TestClient (it imports
          # backend.server:app on the runner host, not the container). Without
          # STORAGE_BACKEND=sqlite it defaults to mongo and every test fails with
          # ServerSelectionTimeoutError (no Mongo on the runner). SQLite needs no
          # external service.
          STORAGE_BACKEND: sqlite
          SQLITE_DB_PATH: /tmp/e2e_complementary.db
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ env.E2E_JWT_SECRET }}
        run: |
          # Deps are installed to the job's system Python (see "Install test
          # deps"); there is no .venv here. Using ./.venv/bin/python raised
          # "No such file or directory" and silently skipped these tests.
          # Kept as || true (non-blocking) because this suite still has a few
          # pre-existing test bugs (e.g. asserting /api/ping, /api/doctor) that
          # are out of scope here; the SQLite env at least stops the spurious
          # Mongo-timeout failures so real regressions can surface in the log.
          python -m pytest tests/e2e/test_all_features.py -v --tb=short -q || true

      - name: Cleanup
        if: always()
        run: |
          docker stop e2e-backend 2>/dev/null || true
          docker rm e2e-backend 2>/dev/null || true
