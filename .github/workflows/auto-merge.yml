name: Auto-merge PR

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run when CI succeeded and a PR was actually associated with the run.
    # On push events workflow_run.pull_requests is [] (empty array) which is
    # truthy in GHA — we must check for at least one entry.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.pull_requests[0] != null }}
    steps:
      - name: Get PR number from the workflow run
        id: pr
        run: |
          PR_NUMBER=$(echo '${{ toJSON(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR associated with this workflow run — skipping"
            echo "pr_number=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Merge PR
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          # SAFETY: never auto-merge a draft PR. Draft PRs created by
          # issue-context-generator contain only a planning doc (docs/context/*.md)
          # — they are "yet to be implemented" and must not be closed by housekeeping
          # or auto-merge. Also skip PRs labelled quick-note:planning as belt-and-suspenders.
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --json isDraft -q '.isDraft' 2>/dev/null || echo "false")
          HAS_PLANNING=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name | select(. == "quick-note:planning")' 2>/dev/null || echo "")
          if [ "$IS_DRAFT" = "true" ] || [ -n "$HAS_PLANNING" ]; then
            echo "Skipping PR #$PR_NUMBER — draft PR (isDraft=$IS_DRAFT) or labelled quick-note:planning."
            echo "Draft PRs are planning docs only and must be implemented by the agent before merge."
            exit 0
          fi
          echo "Auto-merging PR #$PR_NUMBER after successful CI..."
          gh pr merge "$PR_NUMBER" --squash --admin --delete-branch || {
            echo "::warning::Auto-merge failed (branch protection or conflicts). Manual merge may be needed."
            exit 0
          }
