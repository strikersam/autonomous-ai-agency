name: Perplexity Maintenance

# Autonomous maintenance workflow — runs test suite health checks,
# security scans, dependency audits, and auto-merges safe PRs.
# Invoked by the agency-cycle CEO when it detects stale dependencies
# or accumulated low-severity security findings.

on:
  schedule:
    - cron: '0 2 * * 1'   # every Monday at 02:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: 'Maintenance scope'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - security-only
          - deps-only
          - test-health-only

jobs:
  maintenance:
    name: Perplexity Maintenance
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt bandit safety -q 2>&1 | tail -3

      - name: Test suite health check
        if: inputs.scope == 'full' || inputs.scope == 'test-health-only'
        id: test_health
        run: |
          python -m pytest --tb=short -q --no-header 2>&1 | tee /tmp/test_health.txt || true
          EXIT=${PIPESTATUS[0]}
          PASSED=$(grep -oP '\d+(?= passed)' /tmp/test_health.txt || echo 0)
          FAILED=$(grep -oP '\d+(?= failed)' /tmp/test_health.txt || echo 0)
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"
          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "Test suite: ${PASSED} passed, ${FAILED} failed"

      - name: Bandit SAST scan
        if: inputs.scope == 'full' || inputs.scope == 'security-only'
        id: bandit
        run: |
          bandit -r . --exclude ".git,.venv,venv,node_modules,tests,frontend" -ll -f json -o /tmp/bandit.json 2>/dev/null || true
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/bandit.json')); print(len(d.get('results',[])))" 2>/dev/null || echo 0)
          echo "findings=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Bandit: ${COUNT} findings"

      - name: Dependency CVE audit
        if: inputs.scope == 'full' || inputs.scope == 'deps-only'
        id: safety
        run: |
          safety check --json --output /tmp/safety.json 2>/dev/null || true
          VULNS=$(python3 -c "import json; d=json.load(open('/tmp/safety.json')); print(len(d.get('vulnerabilities',[])))" 2>/dev/null || echo 0)
          echo "vulnerabilities=${VULNS}" >> "$GITHUB_OUTPUT"
          echo "Safety: ${VULNS} vulnerabilities"

      - name: Auto-merge safe Dependabot PRs
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            for (const pr of prs) {
              if (!pr.user.login.includes('dependabot')) continue;
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });
              const allPassed = checks.check_runs.every(c => 
                c.conclusion === 'success' || c.conclusion === 'skipped' || c.conclusion === 'neutral'
              );
              if (allPassed && pr.mergeable) {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
                console.log(`Merged dependabot PR #${pr.number}: ${pr.title}`);
              }
            }

      - name: Create maintenance report issue if problems found
        if: steps.test_health.outputs.exit_code != '0' || steps.bandit.outputs.findings != '0' || steps.safety.outputs.vulnerabilities != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testHealth = fs.existsSync('/tmp/test_health.txt') ? fs.readFileSync('/tmp/test_health.txt', 'utf8').slice(0, 1000) : 'N/A';
            const body = [
              '## Perplexity Maintenance Report',
              '',
              '| Check | Result |',
              '|-------|--------|',
              `| Test suite | ${{ steps.test_health.outputs.passed || '0' }} passed, ${{ steps.test_health.outputs.failed || '0' }} failed |`,
              `| Bandit SAST | ${{ steps.bandit.outputs.findings || '0' }} findings |`,
              `| Safety CVE | ${{ steps.safety.outputs.vulnerabilities || '0' }} vulnerabilities |`,
              '',
              '### Test output',
              '```',
              testHealth,
              '```',
              '',
              '_Auto-generated by perplexity-maintenance.yml. Run weekly to catch regressions early._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'maintenance', state: 'open', per_page: 5,
            });
            if (!issues.some(i => i.title.includes('Perplexity Maintenance'))) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Perplexity Maintenance Report — ${new Date().toISOString().split('T')[0]}`,
                body,
                labels: ['maintenance', 'auto-detected'],
              });
            }

      - name: Publish summary
        if: always()
        run: |
          {
            echo "### Perplexity Maintenance — $(date -u '+%Y-%m-%d %H:%M') UTC"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            T_ICON=$([[ "${{ steps.test_health.outputs.exit_code }}" == "0" ]] && echo "✅" || echo "❌")
            echo "| Test suite | ${T_ICON} ${{ steps.test_health.outputs.passed || '0' }} passed, ${{ steps.test_health.outputs.failed || '0' }} failed |"
            echo "| Bandit SAST | ${{ steps.bandit.outputs.findings || '0' }} findings |"
            echo "| Safety CVE | ${{ steps.safety.outputs.vulnerabilities || '0' }} vulnerabilities |"
          } >> "$GITHUB_STEP_SUMMARY"
