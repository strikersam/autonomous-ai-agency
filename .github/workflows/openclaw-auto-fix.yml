name: OpenClaw Auto-Fix

on:
  schedule:
    # Run weekly on Sundays at 03:00 UTC for ongoing auto-remediation
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      fix_bandit:
        description: "Auto-fix Bandit SAST findings"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  security-events: write
  pull-requests: write

concurrency:
  group: openclaw-autofix
  cancel-in-progress: true

jobs:
  scan-and-fix:
    name: Scan & Auto-Fix Security Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install bandit
          pip install -r requirements.txt --quiet 2>/dev/null || true

      - name: Run Bandit SAST scan
        id: bandit
        run: |
          bandit -r . -f json -o bandit-results.json --exit-zero -q \
            --skip B101,B311 \
            --exclude .venv,node_modules,tests,.git 2>/dev/null || true
          ISSUE_COUNT=$(python3 -c "import json; d=json.load(open('bandit-results.json')); print(len(d.get('results',[])))")
          echo "count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Bandit found $ISSUE_COUNT issues"

      - name: Create PR for auto-fixes
        if: steps.bandit.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="auto/openclaw-security-fix-$(date +%Y%m%d)"
          git config user.name "openclaw[bot]"
          git config user.email "openclaw[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH" || true
          
          # Auto-fix safe patterns: replace str(e) in error responses
          python3 << 'PYFIX'
          import re, glob
          
          fixed_files = []
          for py_file in glob.glob("**/*.py", recursive=True):
              if any(skip in py_file for skip in [".venv", "node_modules", "tests/", ".git"]):
                  continue
              try:
                  with open(py_file) as f:
                      content = f.read()
                  orig = content
                  # Fix: replace str(e) in HTTPException detail with generic message
                  content = re.sub(
                      r'(raise HTTPException\(\s*status_code=\d+,\s*detail=)str\((\w+)\)(\))',
                      r'\1"Internal server error"\3',
                      content
                  )
                  if content != orig:
                      with open(py_file, 'w') as f:
                          f.write(content)
                      fixed_files.append(py_file)
              except Exception:
                  continue
          
          if fixed_files:
              for f in fixed_files:
                  print(f"Fixed: {f}")
          else:
              print("No auto-fixable patterns found")
          PYFIX
          
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "fix(security): auto-fix str(e) stack-trace exposure (OpenClaw)"
          git push origin "$BRANCH" || { echo "Push failed"; exit 0; }
          
          gh pr create \
            --title "fix(security): OpenClaw auto-fix security alerts" \
            --body "## Automated Security Fix (OpenClaw)

This PR was automatically generated by the OpenClaw security auto-fix workflow.

### Changes
- Replaced \`str(e)\` in HTTPException responses with generic error messages
- Prevents stack-trace exposure to API consumers

### Validation
- All existing tests should continue to pass
- This is a minimal, safe change — only error message text is modified
" \
            --label "security,automated" \
            --draft || echo "PR creation failed or already exists"
