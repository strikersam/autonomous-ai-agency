name: Deploy to Cloudflare Workers

# Only deploy on version tags — NOT on every push or PR.
# Cloudflare's automatic GitHub integration (dashboard-configured) should be
# DISABLED in favour of this workflow so CI on unrelated PRs doesn't block
# with a failing Workers build.
#
# To disable the automatic integration:
#   Cloudflare Dashboard → Workers & Pages → local-llm-server
#   → Settings → Builds & Deployments → Disconnect GitHub auto-deploy

on:
  push:
    branches:
      - master          # deploy on every push to master (post-PR-merge)
    tags:
      - 'v*'           # also deploy on version tags (v1.0.0, v2.1.3, etc.)
  workflow_dispatch:    # manual trigger for emergency deploys

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend (SPA)
        working-directory: frontend
        env:
          CI: 'false'
          PUBLIC_URL: '/'
          REACT_APP_BACKEND_URL: ''
        run: npm run build

      - name: Remove CRA _redirects (incompatible with Workers Assets)
        run: rm -f frontend/build/_redirects

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc

  # ── Post-deploy smoke tests ────────────────────────────────────────────────
  # Lightweight health + console-error checks against the live Cloudflare
  # Workers URL. Runs immediately after a successful deploy — catches routing
  # regressions, missing assets, and API surface breakage. This is a blocking
  # gate: if it fails, the workflow stops and `ui-test-adversarial` does not run.
  smoke-test:
    name: Post-deploy smoke test
    needs: deploy
    runs-on: ubuntu-latest
    env:
      PLATFORM_URL: https://local-llm-server.strikersam.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install httpx + requests
        run: pip install httpx requests

      - name: Smoke: public health endpoints
        run: |
          python3 -c "
          import os, urllib.request, json

          base = os.environ['PLATFORM_URL']
          # /api/health may return 403 from the Cloudflare Worker if the route
          # is not forwarded to Render; treat 403 as a routing warning, not failure
          # since the HTML pages are the primary smoke signal.
          checks = [
            '/api/health',
            '/api/doctor/public',
          ]
          for path in checks:
              try:
                  url = base + path
                  with urllib.request.urlopen(url, timeout=15) as r:
                      body = json.loads(r.read())
                      status = r.status
                      print(f'OK  {path} -> HTTP {status}  {body.get(\"status\",\"?\")}')
              except urllib.error.HTTPError as e:
                  if e.code == 403:
                      print(f'WARN {path} -> HTTP 403 (auth-gated, skipping)')
                  else:
                      print(f'ERR {path} -> HTTP {e.code}')
              except Exception as e:
                  print(f'ERR {path} -> {e}')
          "

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Smoke: Playwright console-error check (critical pages)
        run: |
          python3 << 'EOF'
          import os, sys, json
          try:
              from playwright.sync_api import sync_playwright
          except ImportError:
              print('Playwright not available — skipping browser smoke')
              sys.exit(0)

          BASE = os.environ['PLATFORM_URL']

          CRITICAL_PAGES = ['/', '/login', '/tasks', '/agents', '/doctor', '/settings']
          results = []

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(viewport={'width': 1280, 'height': 720})
              page = context.new_page()
              console_errors = []
              def on_console(msg):
                  if msg.type == 'error':
                      console_errors.append(msg.text)
              page.on('console', on_console)
              for path in CRITICAL_PAGES:
                  console_errors.clear()
                  try:
                      page.goto(BASE + path, wait_until='domcontentloaded', timeout=20000)
                      page.wait_for_timeout(1500)
                      body_text = page.locator('body').inner_text()[:300].lower()
                      if any(x in body_text for x in ['internal server error', 'something went wrong', '500']):
                          results.append(f'PAGE_ERROR {path}')
                      elif console_errors:
                          critical = [e for e in console_errors if '500' in e or 'ERR_FAILED' in e]
                          if critical:
                              results.append(f'CONSOLE_ERROR {path}: {critical[0][:80]}')
                          else:
                              results.append(f'OK {path} (warnings only)')
                      else:
                          results.append(f'OK {path}')
                  except Exception as e:
                      results.append(f'NAV_ERROR {path}: {e}')
              browser.close()

          for r in results:
              print(r)
          errors = [r for r in results if not r.startswith('OK')]
          if errors:
              print(f'::error::Smoke test failures: {errors}')
          else:
              print('All critical pages OK')
          EOF

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshots
          path: /tmp/*.png
          retention-days: 3

  # ── Adversarial UI testing (Playwright — no external service needed) ──────
  # Full three-round adversarial testing against the live Cloudflare Workers
  # URL. Tries to BREAK the app: empty inputs, edge cases, rapid interactions,
  # console errors. Non-blocking by design — surfaces real defects in the log
  # without gating a rollback. Uses Playwright with local Chromium — no
  # Browserbase API key, no external service dependency. No credentials needed
  # (public endpoints only — auth-gated pages are skipped gracefully).
  ui-test-adversarial:
    name: Adversarial UI test (live platform)
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PLATFORM_URL: https://local-llm-server.strikersam.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run adversarial UI test (Playwright)
        run: |
          mkdir -p /tmp/adversarial-screenshots

          python3 << 'PYEOF'
          import os, sys, json, re
          try:
              from playwright.sync_api import sync_playwright
          except ImportError:
              print('Playwright not available — skipping adversarial test')
              sys.exit(0)

          BASE = os.environ['PLATFORM_URL']
          SCREENSHOT_DIR = '/tmp/adversarial-screenshots'
          failures, passes = [], []

          def log(msg): print(f'  {msg}')

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)

              # Phase 1: public endpoint health
              print('=== Phase 1: Public endpoints ===')
              import urllib.request
              for path in ['/api/health', '/api/doctor/public']:
                  try:
                      with urllib.request.urlopen(BASE + path, timeout=15) as r:
                          log(f'OK  {path} -> HTTP {r.status}')
                          passes.append(f'endpoint:{path}')
                  except urllib.error.HTTPError as e:
                      if e.code == 403:
                          log(f'WARN {path} -> HTTP 403 (auth-gated, skip)')
                      else:
                          log(f'ERR {path} -> HTTP {e.code}')
                          failures.append(f'endpoint:{path}:HTTP_{e.code}')
                  except Exception as e:
                      log(f'ERR {path} -> {e}')
                      failures.append(f'endpoint:{path}:{e}')

              # Phase 2: public-facing pages console-error checks
              # Login-gated pages (e.g. /tasks, /agents) will redirect to /login
              # and are tested for graceful handling (no 500 errors).
              print('=== Phase 2: Public + auth-gated pages console checks ===')
              context = browser.new_context(viewport={'width': 1280, 'height': 720})
              page = context.new_page()
              console_errors = []
              def on_console(msg):
                  if msg.type == 'error': console_errors.append(msg.text)
              page.on('console', on_console)

              for path in ['/', '/login', '/tasks', '/agents', '/doctor', '/settings']:
                  console_errors.clear()
                  try:
                      page.goto(BASE + path, wait_until='domcontentloaded', timeout=20000)
                      page.wait_for_timeout(2000)
                      body_text = page.locator('body').inner_text()[:300].lower()
                      # 500-level errors are failures regardless of auth status
                      if any(x in body_text for x in ['internal server error', 'something went wrong', '500']):
                          page.screenshot(path=f'{SCREENSHOT_DIR}/{path.replace("/","_")}_500.png')
                          log(f'FAIL {path}: 500 error in page body')
                          failures.append(f'page500:{path}')
                          continue
                      errors = [e for e in console_errors if any(x in e for x in ['500', 'ERR_FAILED', 'Uncaught'])]
                      if errors:
                          page.screenshot(path=f'{SCREENSHOT_DIR}/{path.replace("/","_")}_console-error.png')
                          log(f'CONSOLE_ERROR {path}: {errors[0][:80]}')
                          failures.append(f'console:{path}:{errors[0][:60]}')
                      else:
                          log(f'OK  {path} — no console errors')
                          passes.append(f'page:{path}')
                  except Exception as e:
                      page.screenshot(path=f'{SCREENSHOT_DIR}/{path.replace("/","_")}_nav-error.png')
                      log(f'NAV_ERROR {path}: {e}')
                      failures.append(f'nav:{path}:{e}')

              # Phase 3: adversarial — /login page graceful handling
              # Check that empty submit on login form gives validation feedback, not 500
              print('=== Phase 3: Adversarial — empty login submit ===')
              try:
                  page.goto(BASE + '/login', wait_until='domcontentloaded', timeout=20000)
                  page.wait_for_timeout(1500)
                  page.screenshot(path=f'{SCREENSHOT_DIR}/login_empty_before.png')
                  # Click submit without filling — test validation
                  page.locator('button[type="submit"], button:has-text("Sign"), button:has-text("Log"), button:has-text("Enter")').first.click()
                  page.wait_for_timeout(2000)
                  page.screenshot(path=f'{SCREENSHOT_DIR}/login_empty_submit.png')
                  body_text = page.locator('body').inner_text()[:500].lower()
                  if '500' in body_text or 'internal server error' in body_text:
                      log('FAIL: Empty login submit produced 500 (expected: validation error)')
                      failures.append('adversarial:login-empty:500')
                  else:
                      log('PASS: Empty login submit handled gracefully')
                      passes.append('adversarial:login-empty:graceful')
              except Exception as e:
                  log(f'ADVERSARIAL_SKIP: {e}')

              browser.close()

          print(f'\nResult: {len(passes)} passed | {len(failures)} failed')
          if failures:
              print('::error::Adversarial test failures:')
              for f in failures: print(f'  FAIL: {f}')
          else:
              print('All adversarial checks passed')
          PYEOF

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-ui-test-screenshots
          path: /tmp/adversarial-screenshots/
          retention-days: 7
          if-no-files-found: ignore