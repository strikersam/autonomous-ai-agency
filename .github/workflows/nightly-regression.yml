name: Nightly Regression (2 AM CEST)

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC = 2 AM CEST
  workflow_dispatch:      # Manual trigger for ad-hoc runs
    inputs:
      auto_fix:
        description: 'Auto-fix failures (create PR)'
        type: boolean
        default: true
      create_issue:
        description: 'Create issue for unfixable failures'
        type: boolean
        default: true

concurrency:
  group: nightly-regression
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  regression:
    name: Full Browser Regression (Desktop + Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      regression_exitcode: ${{ steps.regression.outputs.exitcode }}
      telegram_e2e_exitcode: ${{ steps.telegram_e2e.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      # ubuntu-latest (>=24.04) no longer ships a `chromium-browser` apt
      # package; Playwright bundles its own Chromium with `--with-deps`.
      - name: Generate ephemeral test credentials
        env:
          CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
          LEGACY_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -n "$CI_ADMIN_PASSWORD" ]; then
            admin_password="$CI_ADMIN_PASSWORD"
          elif [ -n "$LEGACY_ADMIN_PASSWORD" ]; then
            admin_password="$LEGACY_ADMIN_PASSWORD"
          else
            admin_password="$(openssl rand -base64 18)"
          fi

          jwt_secret="$(openssl rand -hex 32)"
          secret_key="$(openssl rand -hex 32)"

          echo "::add-mask::$admin_password"
          echo "::add-mask::$jwt_secret"
          echo "::add-mask::$secret_key"
          {
            echo "E2E_ADMIN_EMAIL=admin@llmrelay.local"
            printf 'E2E_ADMIN_PASSWORD=%s\n' "$admin_password"
            printf 'E2E_JWT_SECRET=%s\n' "$jwt_secret"
            printf 'E2E_SECRET_KEY=%s\n' "$secret_key"
          } >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build and start backend
        run: |
          docker build -f Dockerfile.backend -t llm-relay-backend:nightly .
          docker run -d --name llm-relay-nightly \
            -p 8001:8001 \
            -e STORAGE_BACKEND=sqlite \
            -e ADMIN_EMAIL="$E2E_ADMIN_EMAIL" \
            -e ADMIN_PASSWORD="$E2E_ADMIN_PASSWORD" \
            -e JWT_SECRET="$E2E_JWT_SECRET" \
            -e SECRET_KEY="$E2E_SECRET_KEY" \
            -e SCANNER_HEADLESS_RENDER=off \
            -e SCANNER_BUILTWITH_FALLBACK=off \
            -e ACTIVATION_REQUIRED=false \
            llm-relay-backend:nightly

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8001/api/ping > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          docker logs llm-relay-nightly
          exit 1

      - name: Run regression suite
        id: regression
        env:
          RELAY_BASE_URL: http://localhost:8001
          E2E_ARTIFACT_DIR: /tmp/e2e-artifacts
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
        run: |
          mkdir -p /tmp/e2e-artifacts
          set +e
          python tests/e2e/test_regression.py 2>&1 | tee /tmp/regression-output.txt
          exitcode=${PIPESTATUS[0]}
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit "$exitcode"
        continue-on-error: true

      # Telegram approval e2e (tests/e2e/test_telegram_approval_e2e.py).
      # Same docker backend on :8001 as the regression suite above; overrides
      # the test's default AGENCY_BASE_URL=https://local-llm-server.strikersam.workers.dev
      # to the in-job backend. continue-on-error: true isolates failure from
      # auto-fix (whose sed targets test_regression.py) so a regression failure
      # stays the auto-fix signal; telegram_e2e is logged separately in notify.
      #
      # Silent-failure note: continue-on-error here means telegram_e2e failures
      # are not auto-fixed and not job-blocking — the regression job stays green
      # and the failure shows up only in the notify summary's exit-code cell.
      # Operator must read needs.regression.outputs.telegram_e2e_exitcode.
      - name: Run Telegram approval e2e
        id: telegram_e2e
        env:
          AGENCY_BASE_URL: http://localhost:8001
          ADMIN_USER: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
        run: |
          set +e
          # --override-ini="addopts=" drops the project's --ignore=tests/e2e + -m "not integration"
          # addopt (see pytest.ini) so pytest actually collects the test under
          # the e2e/ directory. -m e2e pins to the marker we registered.
          python -m pytest tests/e2e/test_telegram_approval_e2e.py \
            --override-ini="addopts=" -m e2e -v --tb=short \
            2>&1 | tee /tmp/telegram_e2e-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # Build the report from the captured output of the single regression
      # run above — re-invoking the suite here would run the CRUD tests a
      # second time against the same backend and mutate its state, so the
      # report could diverge from the actual result the job is gated on.
      - name: Generate HTML report
        if: always()
        run: |
          python - <<'PY'
          import html, pathlib

          src = pathlib.Path("/tmp/regression-output.txt")
          out = pathlib.Path("/tmp/e2e-artifacts/regression-report.html")
          out.parent.mkdir(parents=True, exist_ok=True)
          body = src.read_text(encoding="utf-8", errors="replace") if src.exists() \
              else "No regression output was captured."
          out.write_text(
              "<!doctype html><html lang='en'><head><meta charset='utf-8'>"
              "<title>Nightly Regression Report</title></head><body>"
              "<h1>Nightly Regression Report</h1>"
              f"<pre>{html.escape(body)}</pre></body></html>",
              encoding="utf-8",
          )
          PY

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-artifacts
          path: |
            /tmp/e2e-artifacts/
            /tmp/regression-output.txt
            /tmp/telegram_e2e-output.txt
          retention-days: 7

      - name: Fail if regression suite failed
        if: steps.regression.outputs.exitcode != '0'
        run: exit 1

      - name: Stop backend
        if: always()
        run: docker rm -f llm-relay-nightly || true

  auto-fix:
    name: Auto-Fix & Issue Creation
    needs: regression
    if: always() && needs.regression.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Download regression artifacts
        uses: actions/download-artifact@v8
        with:
          name: regression-artifacts
          path: /tmp/e2e-artifacts

      - name: Analyze failures
        id: analyze
        run: |
          echo "Analyzing regression failures..."
          FAILURE_LOG="/tmp/e2e-artifacts/regression-output.txt"

          if [ ! -f "$FAILURE_LOG" ]; then
            echo "No regression output found"
            echo "can_fix=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count failure types
          CONSOLE_ERRORS=$(grep -c "console error" "$FAILURE_LOG" 2>/dev/null || echo 0)
          CRUD_FAILURES=$(grep -c "could not create\|could not find\|navigation error\|empty page" "$FAILURE_LOG" 2>/dev/null || echo 0)
          SERVER_ERRORS=$(grep -c "500\|503\|Internal Server Error" "$FAILURE_LOG" 2>/dev/null || echo 0)

          echo "console_errors=$CONSOLE_ERRORS" >> $GITHUB_OUTPUT
          echo "crud_failures=$CRUD_FAILURES" >> $GITHUB_OUTPUT
          echo "server_errors=$SERVER_ERRORS" >> $GITHUB_OUTPUT

          # Auto-fixable: locator/CSS changes, simple CRUD flakiness
          # NOT auto-fixable: 500 errors, server crashes, business logic changes
          if [ "$SERVER_ERRORS" -gt 0 ]; then
            echo "can_fix=false" >> $GITHUB_OUTPUT
            echo "reason=Server errors detected (500/503) - requires manual investigation" >> $GITHUB_OUTPUT
          elif [ "$CRUD_FAILURES" -gt 0 ] || [ "$CONSOLE_ERRORS" -gt 0 ]; then
            echo "can_fix=true" >> $GITHUB_OUTPUT
            echo "reason=Locator/CRUD failures - attempting auto-fix" >> $GITHUB_OUTPUT
          else
            echo "can_fix=false" >> $GITHUB_OUTPUT
            echo "reason=Unknown failure mode" >> $GITHUB_OUTPUT
          fi

      - name: Attempt auto-fix (locator updates)
        if: ${{ github.event.inputs.auto_fix != 'false' && steps.analyze.outputs.can_fix == 'true' }}
        run: |
          echo "=== Auto-fixing regression test locators ==="
          BRANCH="auto/regression-fix-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          FAILURE_LOG="/tmp/e2e-artifacts/regression-output.txt"

          # Extract specific failures and add broader fallback selectors
          if grep -q "could not find" "$FAILURE_LOG" 2>/dev/null; then
            echo "Found locator failures — adding broader selectors..."
            python .github/scripts/fix_regression_locators.py
          fi

          # If tests timed out, add timeout increases
          if grep -q "timeout\|Time.*out" "$FAILURE_LOG" 2>/dev/null; then
            echo "Found timeout errors — increasing timeouts..."
            sed -i 's/timeout=15000/timeout=20000/g' tests/e2e/test_regression.py
            sed -i 's/timeout=5000/timeout=8000/g' tests/e2e/test_regression.py
          fi

          # If we changed files, commit and create PR
          if ! git diff --quiet; then
            git add tests/e2e/test_regression.py
            git diff --cached
            REASON="$(echo '${{ steps.analyze.outputs.reason }}' | tr '\n' ' ')"
            git commit -m "fix(ci): auto-fix regression test locators and timeouts" -m "Auto-generated by nightly regression workflow. Reason: ${REASON}"
            git push origin "$BRANCH"
            REASON_TITLE="$(echo '${{ steps.analyze.outputs.reason }}' | tr '\n' ' ')"
            cat > /tmp/regression_pr_body.md <<BODYEOF
          Automated PR from [nightly regression run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          **Reason:** ${REASON_TITLE}
          **Console errors:** ${{ steps.analyze.outputs.console_errors }}
          **CRUD failures:** ${{ steps.analyze.outputs.crud_failures }}
          **Server errors:** ${{ steps.analyze.outputs.server_errors }}

          ## Changes Applied
          - Added broader CSS selector fallbacks for form fields
          - Increased timeout values for slow CI environments
          BODYEOF
            gh pr create \
              --title "fix(ci): auto-fix nightly regression — ${REASON_TITLE}" \
              --body-file /tmp/regression_pr_body.md \
              --base master \
              --label "auto-fix,regression"
            echo "✅ Auto-fix PR created: $BRANCH"
          else
            echo "No auto-fix changes needed (failures are not locator/timing related)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create issue for unfixable failures
        if: ${{ github.event.inputs.create_issue != 'false' && steps.analyze.outputs.can_fix == 'false' }}
        run: |
          cat << 'ISSUE_BODY' > /tmp/issue-body.md
          ## Nightly Regression Failure

          **Reason:** ${{ steps.analyze.outputs.reason }}
          **Run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ### Failure Summary
          - Console errors: ${{ steps.analyze.outputs.console_errors }}
          - CRUD failures: ${{ steps.analyze.outputs.crud_failures }}
          - Server errors: ${{ steps.analyze.outputs.server_errors }}

          ### Action Required
          These failures could not be auto-fixed. A developer needs to investigate:

          1. [View the workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          2. Download the `regression-artifacts` from the run
          3. Check the regression output for specific error messages
          4. Fix the underlying issue and re-run manually

          ### Next Steps
          - [ ] Investigate root cause
          - [ ] Fix the issue
          - [ ] Re-run nightly regression: `gh workflow run nightly-regression.yml`
          ISSUE_BODY

          REASON_ISSUE="$(echo '${{ steps.analyze.outputs.reason }}' | tr '\n' ' ')"
          gh issue create \
            --title "fix: nightly regression failures — ${REASON_ISSUE}" \
            --body-file /tmp/issue-body.md \
            --label "bug,regression,nightly" \
            --assignee "${{ github.actor }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

  notify:
    name: Summary Notification
    needs: [regression, auto-fix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## Nightly Regression Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Regression (test_regression.py) | exit=${{ needs.regression.outputs.regression_exitcode || '?' }} (job=${{ needs.regression.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Telegram approval e2e | exit=${{ needs.regression.outputs.telegram_e2e_exitcode || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-Fix | ${{ needs.auto-fix.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
