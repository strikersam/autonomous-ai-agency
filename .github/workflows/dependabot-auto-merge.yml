name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge safe Dependabot updates
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          # Use the built-in GITHUB_TOKEN for metadata fetching — the
          # dependabot/fetch-metadata action requires this (a PAT like GH_PAT
          # causes "github-token is not set!" because the action validates
          # the token differently). The built-in GITHUB_TOKEN is automatically
          # available in every Actions run and has read access to PR metadata.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge patch and minor version bumps (squash, bypass required checks)
      # Uses GH_PAT (admin PAT) here because the built-in GITHUB_TOKEN doesn't
      # have admin bypass for branch protection — only a PAT with repo scope can
      # merge with --admin to bypass required status checks.
      - name: Auto-merge patch / minor
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --squash --admin "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      # Comment on major bumps for human review — don't auto-merge
      - name: Flag major update for human review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "${{ github.event.pull_request.html_url }}" \
            --body "⚠️ **Major version bump** — auto-merge skipped. Please review breaking changes before merging."
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
