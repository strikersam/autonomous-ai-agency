[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
# tests/e2e/ contains standalone scripts run via `python tests/e2e/test_live_server.py`
# in the E2E workflow — exclude from pytest auto-collection to avoid fixture errors.
collect_ignore_glob = ["tests/e2e/*"]
