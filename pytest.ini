[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::pytest.PytestUnhandledThreadExceptionWarning
markers =
    integration: tests that hit live external services/network (excluded by default; run with -m integration)
    livenim: live NVIDIA NIM smoke tests; skipped without NVIDIA_API_KEY in env (run with -m livenim when key is set)
    e2e: end-to-end tests against a deployed/packaged agency (excluded from -x PR gate by the --ignore=tests/e2e addopt; run by the nightly workflow against the in-job docker backend on AGENCY_BASE_URL=http://localhost:8001)
# tests/e2e/ contains standalone scripts run directly (not pytest test functions)
# Live integration tests are excluded by default so CI does not depend on third-party site availability.
addopts = --ignore=tests/e2e -m "not integration"
